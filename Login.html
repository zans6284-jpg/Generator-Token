<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Token System</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="gmail" placeholder="Gmail" required>
        <button onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const mail = document.getElementById('gmail').value;
            if(user && mail) {
                localStorage.setItem('currentUser', user);
                window.location.href = 'generate_token.html';
            } else {
                alert("Harap isi semua bidang!");
            }
        }
    </script>
</body>
</html>
