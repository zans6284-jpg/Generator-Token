<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Generator</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #343a40; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--dark); }
        
        /* Login Style */
        .input-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        
        /* Generator Style */
        #generatorSection { display: none; }
        .token-card { background: #f8f9fa; border: 2px dashed var(--primary); padding: 15px; margin-top: 20px; border-radius: 10px; position: relative; }
        .token-text { font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.1rem; color: #222; }
        .copy-btn { position: absolute; right: 10px; top: 10px; background: none; border: none; cursor: pointer; font-size: 18px; width: auto; }
        .subtitle { font-size: 0.8rem; color: #666; margin-top: 5px; }
        .limit-info { text-align: right; font-size: 0.85rem; margin-top: 5px; color: #d9534f; }

        /* Global Output */
        .global-output { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .global-item { background: white; border-bottom: 1px solid #eee; padding: 10px; font-size: 0.9rem; user-select: none; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; text-transform: uppercase; color: white; }
        .bg-admin { background: #d9534f; }
        .bg-user { background: #5bc0de; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h2>Login System</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="email" id="gmail" placeholder="Gmail">
        </div>
        <button onclick="handleLogin()">Masuk</button>
    </div>

    <div id="generatorSection">
        <h2>Token Generator</h2>
        <p>Welcome, <span id="userDisplay" style="font-weight:bold;"></span> 
           <span id="roleBadge" class="badge"></span></p>

        <div class="input-group">
            <label>Durasi:</label>
            <select id="durationSelect"></select>
        </div>

        <div class="input-group">
            <label>Tipe Token:</label>
            <select id="tokenType">
                <option value="Premium">Premium</option>
                <option value="Login">Login</option>
            </select>
        </div>

        <button onclick="generateToken()" id="btnGen" style="background: var(--success);">Generate Token</button>
        <div id="limitText" class="limit-info"></div>

        <div id="resultArea" style="display:none;">
            <div class="token-card">
                <div id="tokenOutput" class="token-text"></div>
                <button class="copy-btn" onclick="copyResult()">📋</button>
                <div id="subOutput" class="subtitle"></div>
            </div>
        </div>

        <div class="global-output">
            <h3>Global Output (Storage)</h3>
            <div id="globalContainer"></div>
        </div>
        <button onclick="logout()" style="margin-top:20px; background:#666;">Logout</button>
    </div>
</div>

<script>
    let session = null;
    const ADMIN_EMAIL = "zans6284@gmail.com";
    const ADMIN_USER = "1";

    function handleLogin() {
        const u = document.getElementById('username').value;
        const g = document.getElementById('gmail').value;

        if(!u || !g) return alert("Isi semua data!");

        session = {
            username: u,
            email: g,
            isAdmin: (g === ADMIN_EMAIL && u === ADMIN_USER),
            tokenCount: 0
        };

        // Simpan ke local agar saat refresh tidak hilang (opsional)
        showGenerator();
    }

    function showGenerator() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('generatorSection').style.display = 'block';
        document.getElementById('userDisplay').innerText = session.username;
        
        const badge = document.getElementById('roleBadge');
        const selectDurasi = document.getElementById('durationSelect');
        
        // Reset options
        selectDurasi.innerHTML = `
            <option value="1 Day">1 Day</option>
            <option value="1 Minggu">1 Minggu</option>
            <option value="1 Bulan">1 Bulan</option>
            <option value="1 Tahun">1 Tahun</option>
        `;

        if(session.isAdmin) {
            badge.innerText = "OWNER";
            badge.className = "badge bg-admin";
            // Tambah opsi permanent untuk admin
            let opt = document.createElement('option');
            opt.value = "Permanent";
            opt.innerHTML = "Permanent";
            selectDurasi.appendChild(opt);
        } else {
            badge.innerText = "USER";
            badge.className = "badge bg-user";
        }

        updateLimitUI();
        renderGlobal();
    }

    function generateToken() {
        const maxLimit = session.isAdmin ? 10 : 3;
        
        if(session.tokenCount >= maxLimit) {
            alert("Limit token Anda sudah habis!");
            return;
        }

        const durasi = document.getElementById('durationSelect').value;
        const tipe = document.getElementById('tokenType').value;
        
        // KODE ACAK RANDOM & BERBEDA-BEDA
        const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let randomPart = "";
        for(let i=0; i<12; i++) {
            randomPart += charset.charAt(Math.floor(Math.random() * charset.length));
        }
        const finalToken = `ART-${tipe.toUpperCase()}-${randomPart}-${Math.floor(Math.random()*999)}`;

        // Tampilkan Hasil
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('tokenOutput').innerText = finalToken;
        document.getElementById('subOutput').innerText = `${tipe} | Masa aktif: ${durasi}`;

        // Simpan Logika
        session.tokenCount++;
        updateLimitUI();
        saveToGlobal(session.username, finalToken, tipe, durasi, session.isAdmin);
    }

    function saveToGlobal(user, token, type, time, isAdmin) {
        let logs = JSON.parse(localStorage.getItem('global_logs')) || [];
        logs.unshift({ user, token, type, time, isAdmin });
        localStorage.setItem('global_logs', JSON.stringify(logs));
        renderGlobal();
    }

    function renderGlobal() {
        const container = document.getElementById('globalContainer');
        const logs = JSON.parse(localStorage.getItem('global_logs')) || [];
        container.innerHTML = '';

        logs.forEach(log => {
            const div = document.createElement('div');
            div.className = 'global-item';
            div.innerHTML = `
                <b>${log.user}</b> [${log.isAdmin ? 'Admin' : 'User'}] : 
                <code>${log.token}</code> : 
                Informasi ${log.type} : ${log.time}
            `;
            container.appendChild(div);
        });
    }

    function updateLimitUI() {
        const max = session.isAdmin ? 10 : 3;
        document.getElementById('limitText').innerText = `Limit: ${session.tokenCount}/${max}`;
    }

    function copyResult() {
        const txt = document.getElementById('tokenOutput').innerText;
        navigator.clipboard.writeText(txt);
        alert("Token disalin!");
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
